global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  - job_name: "node-exporter"
    dns_sd_configs:
      - names:
          - "tasks.system_node-exporter"
        type: A
        port: 9100

  - job_name: "postgres-exporter"
    dns_sd_configs:
      - names:
          - "tasks.prod_postgres-exporter"
        type: A
        port: 9187

  - job_name: "cadvisor"
    dns_sd_configs:
      - names:
          - "tasks.system_cadvisor"
        type: A
        port: 8080

  - job_name: "hosted-gateway"
    dns_sd_configs:
      - names:
          - "tasks.prod_api"
        type: A
        port: 8080
